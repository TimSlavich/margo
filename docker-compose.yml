services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: margo-web
    ports:
      - "${VITE_PORT:-9000}:80"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
